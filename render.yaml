services:
  - type: web
    name: bcv-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REQUEST_TIMEOUT
        value: "30"
    plan: free
    autoDeploy: true
